name: Build Documentation

# This workflow handles all documentation-related tasks:
# 1. Building the documentation using Sphinx
# 2. Uploading the documentation as an artifact

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'README.md'
      - 'build_docs.py'
      - '.github/workflows/build-docs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '!docs/_build/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'README.md'
      - 'build_docs.py'
      - '.github/workflows/build-docs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '!docs/_build/**'

permissions:
  contents: read

env:
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "latest"

    - name: Set up Python 3.13
      run: uv python install 3.13

    - name: Cache uv packages
      uses: actions/cache@v5
      with:
        path: ${{ env.UV_CACHE_DIR }}
        key: ${{ runner.os }}-uv-3.13-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-3.13-
          ${{ runner.os }}-uv-

    - name: Install Pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Build documentation
      run: |
        uv sync --extra docs
        uv run build_docs.py
        
    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v7
      with:
        name: documentation
        path: docs/_build/html/
        retention-days: 7
        if-no-files-found: error # Fail the workflow if no files are found
        overwrite: true

name: Push Documentation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'README.md'
      - 'build_docs.py'
      - '.github/workflows/push-docs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '!docs/_build/**'

permissions:
  contents: write

env:
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  build-and-push-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "latest"

    - name: Set up Python 3.13
      run: uv python install 3.13

    - name: Cache uv packages
      uses: actions/cache@v5
      with:
        path: ${{ env.UV_CACHE_DIR }}
        key: ${{ runner.os }}-uv-3.13-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-3.13-
          ${{ runner.os }}-uv-

    - name: Install Pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Build documentation
      run: |
        uv sync --extra docs
        uv run build_docs.py

    - name: Push generated documentation
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/_build/html docs/*.rst
        if git diff --cached --quiet; then
          echo "No documentation changes to push."
        else
          git commit -m "docs: update generated documentation"
          git push
        fi
